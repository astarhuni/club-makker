    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: "Poppins", sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
        }

         .card {
            width: 250px;
            height: 260px;
            /* background: rgba(255, 255, 255, 0.08); */
            background: linear-gradient(135deg, #0f172a, #1e293b, #111827);

            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px;
            padding: 5px;
            /* box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); */
            position: relative;
            overflow: hidden;

            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -60px;
            right: -60px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle,
                    rgba(168, 85, 247, 0.45),
                    transparent);
            border-radius: 50%;
            z-index: 1;
        }

        .card::after {
            content: "";
            position: absolute;
            bottom: -60px;
            left: -60px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle,
                    rgba(34, 197, 94, 0.35),
                    transparent);
            border-radius: 50%;
            z-index: 1;
        }

        .logo {
            width: calc(100% + 10px);
            height: 45px;
            background: rgba(255, 255, 255, 0.07);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: -5px -5px 12px -5px;
            border-radius: 22px 22px 0 0;
            z-index: 5;
            position: relative;
            flex-shrink: 0;
        }

        .logo img {
            width: 130px;
            height: 32px;
            object-fit: contain;
        }

        .inject-btn {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(147, 51, 234, 0.3);
            transition: 0.3s ease;
        }

        .inject-btn:active {
            transform: scale(0.96);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 12px;
            flex-shrink: 0;
            z-index: 5;
        }

        .exit-btn {
            background: linear-gradient(135deg, #475569, #1e293b) !important;

        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #22c55e;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-box {

<body>
    <div class="card" style="transform: translate3d(-3.76459px, 112px, 0px);">
        <div class="logo">
            <img src="image.png" alt="JAI Club Logo">
        </div>

        <div class="user-box" id="resultBox" style="margin-bottom: 0px">
            <div id="resultContent" style="
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
          ">
                <span class="user-info-value" style="color: rgba(255, 255, 255, 0.3); font-size: 18px">READY</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="inject-btn" id="resultBtn">Result</button>
            <button class="inject-btn exit-btn" id="exitBtn">Exit</button>
        </div>

        <div style="
          text-align: center;
          margin-top: 10px;
          font-size: 12px;
          color: rgba(255, 255, 255, 0.4);
          font-weight: 500;
          letter-spacing: 0.8px;
          z-index: 5;
        ">
            KingPatcher.com
        </div>
    </div>

    <script>
        const resultBtn = document.getElementById("resultBtn");
        const exitBtn = document.getElementById("exitBtn");
        const resultContent = document.getElementById("resultContent");

        resultBtn.addEventListener("click", () => {
            // Show loading animation using existing spinner class
            resultContent.innerHTML =
                '<div class="spinner" style="width: 40px; height: 40px; border-width: 4px; margin: 0;"></div>';

            setTimeout(() => {
                const results = ["BIG", "SMALL"];
                const randomResult =
                    results[Math.floor(Math.random() * results.length)];

                // Color mapping: BIG = #FEAA57 (Orange), SMALL = #6EA8F4 (Blue)
                const color = randomResult === "BIG" ? "#FEAA57" : "#6EA8F4";
                const shadow =
                    randomResult === "BIG"
                        ? "rgba(254, 170, 87, 0.5)"
                        : "rgba(110, 168, 244, 0.5)";

                resultContent.innerHTML = `<span class="user-info-value" style="font-size: 38px; font-weight: 800; color: ${color}; text-shadow: 0 0 18px ${shadow}; animation: fadeUp 0.5s ease;">${randomResult}</span>`;
            }, 2000);
        });

        exitBtn.addEventListener("click", () => {
            if (typeof Android !== "undefined") {
                Android.closeApp(); // Common method in such wrappers
            } else {
                window.close();
            }
        });

        // Disable zoom shortcuts
        document.addEventListener("gesturestart", function (e) {
            e.preventDefault();
        });

        document.addEventListener(
            "dblclick",
            function (e) {
                e.preventDefault();
            },
            { passive: false },
        );

        function androidRun() {
            if (typeof Android !== "undefined") {
                const rootBg = getComputedStyle(document.documentElement)
                    .getPropertyValue("--bg")
                    .trim();

                Android.changeStatusBarColor("#1e293b", "light");
                Android.changeNavigationBarColor("#1e293b", "light");
            }
        }
        androidRun();

        // Draggable Logic extracted from floating.js
        const card = document.querySelector('.card');
        const dragHandle = document.querySelector('.logo');
        
        let isDragging = false;
        let currentX = 0, currentY = 0, initialX, initialY;
        let xOffset = 0, yOffset = 0;

        dragHandle.addEventListener("touchstart", dragStart, {passive: false});
        document.addEventListener("touchend", dragEnd, false);
        document.addEventListener("touchmove", drag, {passive: false});
        
        dragHandle.addEventListener("mousedown", dragStart, false);
        document.addEventListener("mouseup", dragEnd, false);
        document.addEventListener("mousemove", drag, false);

        function dragStart(e) {
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }
            if (e.target === dragHandle || dragHandle.contains(e.target)) {
                isDragging = true;
            }
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }
                xOffset = currentX;
                yOffset = currentY;
                card.style.transform = "translate3d(" + currentX + "px, " + currentY + "px, 0)";
            }
        }
    </script>


</body></html>
